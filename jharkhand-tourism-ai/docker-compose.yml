version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jharkhand_tourism_db
    environment:
      POSTGRES_DB: jharkhand_tourism
      POSTGRES_USER: tourism_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tourism_pass_2024}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - tourism_network
    restart: unless-stopped

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: jharkhand_tourism_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tourism_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jharkhand_tourism_backend
    environment:
      - DATABASE_URL=postgresql://tourism_user:${POSTGRES_PASSWORD:-tourism_pass_2024}@postgres:5432/jharkhand_tourism
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - tourism_network
    volumes:
      - ./data/uploads:/app/uploads
      - ./ai_ml/models:/app/models
    restart: unless-stopped

  # AI/ML Services
  ai_service:
    build:
      context: ./ai_ml
      dockerfile: Dockerfile
    container_name: jharkhand_tourism_ai
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CLIP_MODEL_PATH=/app/models/clip
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    ports:
      - "8001:8001"
    depends_on:
      - redis
    networks:
      - tourism_network
    volumes:
      - ./ai_ml/models:/app/models
      - ./data/images:/app/images
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jharkhand_tourism_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_AI_SERVICE_URL=http://localhost:8001
      - REACT_APP_MAPS_API_KEY=${MAPS_API_KEY}
      - GENERATE_SOURCEMAP=false
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tourism_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: jharkhand_tourism_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - ai_service
    networks:
      - tourism_network
    restart: unless-stopped

  # Elasticsearch for search functionality
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: jharkhand_tourism_search
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - tourism_network
    restart: unless-stopped

  # Kibana for analytics dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: jharkhand_tourism_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - tourism_network
    restart: unless-stopped

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: jharkhand_tourism_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - tourism_network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: jharkhand_tourism_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - tourism_network
    restart: unless-stopped

networks:
  tourism_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data: